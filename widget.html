<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Venue Concierge</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink:#0d1117;--ink-soft:#1a2332;--gold:#3a9fb0;--gold-rgb:58,159,176;--gold-lt:#4dbbc9;
      --ivory:#0d1117;--ivory-dk:rgba(255,255,255,0.85);--cream:rgba(255,255,255,0.06);
      --stone:rgba(255,255,255,0.4);--white:#131b2e;--green:#4ade80;--error:#ff6b6b;

    }
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden}
    body{font-family:var(--sans)}
    #chat-toggle{display:none !important}

    #chat-avatar{position:relative;width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,rgba(var(--gold-rgb),0.25) 0%,rgba(var(--gold-rgb),0.08) 100%);display:flex;align-items:center;justify-content:center;flex-shrink:0;z-index:1}
    #chat-avatar::before{content:'';position:absolute;inset:-1px;border-radius:50%;padding:1px;background:linear-gradient(135deg,rgba(var(--gold-rgb),0.6),rgba(var(--gold-rgb),0.15));-webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none}

    .hd-info span{font-size:10px;color:rgba(255,255,255,0.55);letter-spacing:0.12em;display:inline-flex;align-items:center;gap:7px;text-transform:uppercase;font-weight:500}
    .hd-info span::before{content:'';width:5px;height:5px;background:#6ee7a0;border-radius:50%;box-shadow:0 0 0 3px rgba(110,231,160,0.15),0 0 8px rgba(110,231,160,0.5);animation:pulse 2.4s infinite ease-in-out;flex-shrink:0}

    @keyframes pulse{0%,100%{box-shadow:0 0 0 3px rgba(110,231,160,0.15),0 0 8px rgba(110,231,160,0.5)}50%{box-shadow:0 0 0 4px rgba(110,231,160,0.08),0 0 12px rgba(110,231,160,0.7)}}
    #chat-messages{flex:1;overflow-y:auto;padding:22px 18px 18px;background:#0a0f18;background-image:radial-gradient(circle at 10% 0%,rgba(var(--gold-rgb),0.05) 0%,transparent 45%),radial-gradient(circle at 90% 100%,rgba(var(--gold-rgb),0.03) 0%,transparent 50%);display:flex;flex-direction:column;gap:12px}

    #chat-messages::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.15)}

    .msg.err{background:rgba(255,107,107,0.08);color:var(--error);align-self:flex-start;font-size:12px;border:1px solid rgba(163,48,48,0.15)}

    .qr button.slot:hover{background:var(--green);color:#0d1117;border-color:var(--green);box-shadow:0 4px 12px rgba(74,222,128,0.35)}
    .qr button.cust{border-style:dashed;color:var(--stone);border-color:var(--cream)}
    .qr.used button{pointer-events:none;opacity:0.3}
    .route-select{display:flex;flex-wrap:wrap;gap:6px;align-self:flex-start;max-width:94%;flex-shrink:0;margin-top:2px}
    .route-select button{background:rgba(255,255,255,0.035);color:rgba(255,255,255,0.88);border:1px solid rgba(255,255,255,0.08);border-radius:100px;padding:9px 16px 9px 14px;font-size:12.5px;font-family:var(--sans);font-weight:500;letter-spacing:0.015em;cursor:pointer;transition:all 0.25s cubic-bezier(.34,1.4,.6,1);text-align:left;display:inline-flex;align-items:center;gap:8px;white-space:nowrap;backdrop-filter:blur(4px)}

    .typ span:nth-child(2){animation-delay:-0.16s}

    #chat-input-area{padding:12px 14px;background:#0d1117;border-top:1px solid rgba(255,255,255,0.06);display:flex;gap:9px;align-items:center;flex-shrink:0}

    #chat-input{flex:1;padding:11px 17px;border:1px solid rgba(255,255,255,0.1);border-radius:22px;font-size:16px;font-family:var(--sans);font-weight:400;background:rgba(255,255,255,0.04);outline:none;transition:all 0.2s;color:rgba(255,255,255,0.9)}
    #chat-input:focus{border-color:var(--gold);background:rgba(255,255,255,0.06);box-shadow:0 0 0 3px rgba(var(--gold-rgb),0.08)}
    #chat-input::placeholder{color:var(--stone);font-weight:300}
    #chat-send{width:42px;height:42px;background:var(--gold);border:none;border-radius:50%;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;box-shadow:0 2px 8px rgba(28,20,17,0.25)}
    #chat-send:hover{background:#4dbbc9;transform:scale(1.06)}
    #chat-send:disabled{background:var(--cream);cursor:not-allowed;box-shadow:none;transform:none}
    #chat-send svg{width:18px;height:18px;fill:#fff}
    #pby{text-align:center;padding:10px 14px;font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:0.03em;background:#0d1117;border-top:1px solid rgba(255,255,255,0.05);flex-shrink:0;line-height:1.5;font-weight:400}
    #pby a{color:rgba(255,255,255,0.5);text-decoration:none;border-bottom:1px solid rgba(255,255,255,0.15);transition:all 0.2s;padding-bottom:1px}
    #pby a:hover{color:var(--gold-lt);border-bottom-color:var(--gold-lt)}
    @media(max-width:480px){#chat-window{width:100%;height:100%;top:0;left:0;right:0;bottom:0;border-radius:0}}
  </style>
</head>

function showTm(dk){var sec=con.querySelector('#tms'),info=bd[dk];if(!info||!info.times||!info.times.length){var dd=new Date(dk+'T12:00:00');info={dayName:['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][dd.getDay()],displayDate:MS[dd.getMonth()]+' '+dd.getDate(),times:[]}}var all=[];for(var mn=_tourStartHour*60;mn<_tourEndHour*60;mn+=_slotInterval){var hr=Math.floor(mn/60),mi=mn%60,ap=hr>=12?'PM':'AM',dh=hr>12?hr-12:(hr===0?12:hr);all.push(dh+':'+(mi<10?'0':'')+mi+' '+ap)}var av={};for(var a=0;a<info.times.length;a++)av[info.times[a]]=true;var anyFree=info.times.length>0;var h='<div style="margin-top:14px"><div style="font-size:10.5px;text-transform:uppercase;letter-spacing:0.1em;color:'+_textSecColor+';font-weight:500;margin-bottom:8px">'+info.dayName+', '+info.displayDate+'</div>';if(!anyFree){h+='<div style="padding:20px;text-align:center;border-radius:10px;font-size:13px;color:'+_textSecColor+';background:'+_hoverBg+';border:1px solid '+_borderColor+'">No availability on this day</div>'}else{h+='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px">';for(var t=0;t<all.length;t++){var free=av[all[t]];h+=free?'<div data-tm="'+all[t]+'" style="padding:8px;text-align:center;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;color:'+_accentHex+';background:'+_hoverBg+';border:1px solid '+_borderColor+';transition:all 0.15s">'+all[t]+'</div>':'<div style="padding:8px;text-align:center;border-radius:8px;font-size:12px;font-weight:500;color:'+_textDimColor+';background:'+(_isLight?'#f5f3f0':_hoverBg)+';text-decoration:line-through">'+all[t]+'</div>'}h+='</div>'}h+='</div><button id="cfb" disabled style="width:100%;padding:12px;margin-top:14px;background:'+_hoverBg+';color:'+_textSecColor+';border:none;border-radius:10px;font-size:12px;font-weight:500;cursor:default;font-family:Outfit,-apple-system,sans-serif;letter-spacing:0.06em;text-transform:uppercase;transition:all 0.2s">Select a time</button>';sec.innerHTML=h;va function addQR(reps){if(!reps||!reps.length)return;if(cState.booking_created){reps=reps.filter(function(r){return(r.value||r.label||r)!=='__SWITCH_TO_BOOKING__'});if(!reps.length)return}var d=document.getElementById('chat-messages'),c=document.createElement('div');c.className='qr';for(var i=0;i<reps.length;i++)(function(r){var b=document.createElement('button');if(r.type==='slot')b.className='slot';else if(r.type==='custom')b.className='cust';b.textContent=r.label||r;b.onclick=function(){c.classList.add('used');var val=r.value||r.label||r;if(val==='__SWITCH_TO_BOOKING__'){currentRoute='booking';hideInputArea();addMsg(r.label||r,'user');sendWH("I'd like to continue scheduling my "+_bookingLabel.toLowerCase());return}if(val==='__SHOW_FAQ_TOPICS__'||val==='__SWITCH_TO_FAQ__'){currentRoute='faq';hideInputArea();addMsg(r.label||r,'user');showFAQTopics();return}if(val==='__DISMISS__'){addMsg(r.label||r,'user');addMsg("You're all set! We look forward to seeing you! \ud83d\ude0a",'bot');hideInputArea();return}addMsg(r.label||r,'user');sendWH(val)};c.appendChild(b)})(reps[i]);d.appendChild(c);scr()}

function sendMessage(){var inp=document.getElementById('chat-input'),m=inp.value.trim();if(!m||busy)return;if(!currentRoute)currentRoute='faq';dis();addMsg(m,'user');inp.value='';sendWH(m)}

function sendWH(msg){if(!msg||!String(msg).trim())return;msg=String(msg).trim();if(!sendWH._count)sendWH._count=0;sendWH._count++;if(sendWH._count>60){addMsg("You've reached the message limit for this session. Please refresh the page to start a new conversation.",'bot');return}dis();var now=Date.now();if(sendWH._last&&(now-sendWH._last)<3000&&sendWH._lastMsg===msg)return;sendWH._last=now;sendWH._lastMsg=msg;

/* CUSTOM TIME: handle locally, send webhook for email only */
if(msg.indexOf('__CUSTOM_TIME__')===0){var rTime=msg.replace('__CUSTOM_TIME__','');addMsg("Your request for **"+rTime+"** has been sent to the team! They\u2019ll reach out within 24 hours to confirm. \ud83d\ude0a",'bot');fetch(CFG.url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sid,venue_id:_venueId,message:'__CUSTOM_TIME__'+rTime,route:'custom_time',client_state:{name:cState.name,email:cState.email,phone:cState.phone,guest_count:cState.guest_count,date_interest:cState.date_interest,custom_time_request:true,requested_time:rTime}})}).catch(function(){});setTimeout(function(){showOptIns()},800);return}

/* STAFF NOTES: save and show opt-ins */
if(msg.indexOf('__STAFF_NOTES__')===0){var notes=msg.replace('__STAFF_NOTES__','');cState.staff_notes=notes;fetch(CFG.url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sid,venue_id:_venueId,message:'__STAFF_NOTES__'+notes,route:'staff_notes',client_state:{name:cState.name,email:cState.email,phone:cState.phone,guest_count:cState.guest_count,date_interest:cState.date_interest,staff_notes:notes}})}).catch(function(){});setTimeout(function(){_notesShown=true;renderTP(_pendingSlots,_pendingByDate)},600);return}

var sb=document.getElementById('chat-send');busy=true;sb.disabled=true;showTyp();recent.push({role:'user',content:msg,timestamp:new Date().toISOString()});if(recent.length>12)recent=recent.slice(-12);var payload={session_id:sid,venue_id:_venueId,message:msg,route:currentRoute||'booking',client_state:{name:cState.name,email:cState.email,phone:cState.phone,guest_count:cState.guest_count,date_interest:cState.date_interest,tour_date:cState.tour_date,budget_range:cState.budget_range,intent_score:cState.intent_score,wants_booking:cState.wants_booking,booking_created:cState.booking_created,escalated:cState.escalated,status:cState.status,sms_optin:cState.sms_optin,custom_time_request:cState.custom_time_request,staff_notes:cState.staff_notes,recent_messages:recent}};
fetch(CFG.url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}).then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json()}).then(function(data){hideTyp();if(sendWH._lastMsg==='__SAVE_OPTINS__'){busy=false;sb.disabled=false;return}if(!data.reply||!data.reply.trim()){busy=false;sb.disabled=false;if(!sendWH._retrying){sendWH._retrying=true;setTimeout(function(){sendWH._retrying=false;sendWH(msg)},1200)}else{sendWH._retrying=false}return}sendWH._retrying=false;addMsg(data.reply,'bot');recent.push({role:'assistant',content:data.reply,timestamp:new Date().toISOString()});if(recent.length>12)recent=recent.slice(-12);if(data.switch_route==='booking')currentRoute='booking';var justBooked=false;if(data.client_state){var cs=data.client_state;if(cs.name)cState.name=cs.name;if(cs.email)cState.email=cs.email;if(cs.phone)cState.phone=cs.phone;if(cs.guest_count)cState.guest_count=cs.guest_count;if(cs.date_interest)cState.date_interest=cs.date_interest;if(cs.tour_date)cState.tour_date=cs.tour_date;if(cs.budget_range)cState.budget_range=cs.budget_range;if(cs.intent_score)cState.intent_score=cs.intent_score;if(cs.wants_booking)cState.wants_booking=true;if(cs.booking_created&&!cState.booking_created)justBooked=true;if(cs.booking_created)cState.booking_created=true;if(cs.escalated)cState.escalated=true;if(cs.status)cState.status=cs.status}var type=data.input_type||'text';setTimeout(function(){try{if(justBooked){showOptIns()}else if(type==='get_contact'){showContactCard('contact')}else if(type==='get_booking_contact'){showContactCard('booking_contact')}else if(type==='get_email'){showContactCard('email')}else if(type==='get_phone'){showPhoneCard()}else if(type==='faq_topics'){hideInputArea();showFAQTopics()}else if(type==='month_year'){hideInputArea();renderMP()}else if(type==='date_time_slots'||type==='date_time_custom'){hideInputArea();var sv=[];if(data.quick_replies)for(var i=0;i<data.quick_replies.length;i++)if(data.quick_repl
